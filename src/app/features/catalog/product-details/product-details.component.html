<div class="max-w-7xl mx-auto px-6 py-10" *ngIf="product() as product">

  <div class="grid md:grid-cols-2 gap-12 bg-white p-8 rounded-2xl shadow-lg">

    <!-- Product Image -->
    <div class="flex items-center justify-center">
      <img
        [src]="product.imageUrl"
        [alt]="product.name"
        class="w-full max-h-[420px] object-cover rounded-xl shadow-md"
      />
    </div>

    <!-- Product Details -->
    <div class="flex flex-col justify-center space-y-4">

      <!-- Title -->
      <h1 class="text-3xl font-bold text-gray-900">
        {{ product.name }}
      </h1>

      <!-- Category -->
      <p class="text-gray-500 text-sm">
        Category: {{ product.category }}
      </p>

      <!-- Price -->
      <div class="text-3xl font-semibold text-green-600">
        {{ product.price | currency:'INR' }}
      </div>

      <!-- Stock -->
      <div class="flex items-center gap-2">
        <span class="text-sm text-gray-600">Available Stock:</span>

        <span
          class="px-3 py-1 rounded-full text-sm font-medium"
          [ngClass]="product.stockQuantity > 0 
            ? 'bg-green-100 text-green-700'
            : 'bg-red-100 text-red-600'">

          {{ product.stockQuantity }}
        </span>
      </div>

      <!-- Rating -->
      <div class="flex items-center gap-2 text-yellow-500 font-medium">
        ⭐ {{ product.rating }} / 5
      </div>

      <!-- Divider -->
      <div class="border-t my-3"></div>

      <!-- Description -->
      <div>
        <h3 class="text-lg font-semibold text-gray-800 mb-2">
          Description
        </h3>

        <p class="text-gray-600 leading-relaxed">
          {{ product.description }}
        </p>
      </div>

      <!-- Add to Cart Button -->
      <button
        (click)="addToCart()"
        class="mt-4 w-full py-3 rounded-xl text-white font-semibold
               bg-gradient-to-r from-indigo-500 to-purple-600
               hover:from-indigo-600 hover:to-purple-700
               transition shadow-md hover:shadow-lg">

        Add to Cart

      </button>

    </div>

  </div>

</div>
