<div class="group bg-white border rounded-lg overflow-hidden shadow-sm hover:shadow-md transition">

  <div class="aspect-square bg-gray-100 overflow-hidden">
    <img
      [src]="product.imageUrl"
      [alt]="product.name"
      class="w-full h-full object-cover group-hover:scale-105 transition">
  </div>

  <div class="p-4">

    <span class="text-xs text-blue-600 font-semibold uppercase">
      {{ product.category }}
    </span>

    <h3 class="text-lg font-medium mt-1 truncate">
      {{ product.name }}
    </h3>

    <p class="text-xl font-bold mt-2">
      {{ product.price | currency:'INR' }}
    </p>

    <a
      [routerLink]="['/product', product.id]"
      class="block text-center mt-4 bg-gray-900 text-white py-2 rounded hover:bg-gray-800">
      View Details
    </a>

  </div>

</div>
