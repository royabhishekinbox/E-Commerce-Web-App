<div class="flex justify-center items-center min-h-screen bg-gradient-to-br from-gray-900 to-gray-800">

  <div class="bg-white/95 backdrop-blur-md p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-200">

    <h2 class="text-3xl font-bold mb-6 text-center text-gray-900">
      Create Account
    </h2>

    <form (ngSubmit)="register()" class="space-y-5">

      <!-- Name -->
      <div>
        <input
          type="text"
          placeholder="Full Name"
          [(ngModel)]="name"
          name="name"
          required
          class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>

      <!-- Email -->
      <div>
        <input
          type="email"
          placeholder="Email Address"
          [(ngModel)]="email"
          name="email"
          required
          class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>

      <!-- Password -->
      <div>
        <input
          type="password"
          placeholder="Password (min 6 characters)"
          [(ngModel)]="password"
          name="password"
          required
          class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>

      <!-- Error -->
      <p class="text-red-500 text-sm text-center" *ngIf="error">
        {{ error }}
      </p>

      <!-- Button -->
      <button
        type="submit"
        class="w-full bg-black text-white py-3 rounded-lg hover:bg-gray-800 transition duration-300 font-semibold">

        Register

      </button>

    </form>

    <!-- Login Redirect -->
    <p class="text-center text-sm text-gray-500 mt-5">
      Already have an account?
      <a routerLink="/login" class="text-indigo-600 font-medium hover:underline">
        Login
      </a>
    </p>

  </div>

</div>
