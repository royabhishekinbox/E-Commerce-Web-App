<div class="max-w-6xl mx-auto px-6 py-10">

  <h1 class="text-3xl font-bold mb-8">
    Shopping Cart
  </h1>

  <!-- Empty Cart -->
  <div *ngIf="cartItems().length === 0" class="text-gray-500 text-lg">
    Your cart is empty.
  </div>

  <!-- Cart Items -->
  <div *ngIf="cartItems().length > 0" class="space-y-6">

    <div
      *ngFor="let item of cartItems()"
      class="grid grid-cols-4 items-center bg-white p-5 rounded-lg shadow">

      <!-- Product Info -->
      <div class="flex items-center gap-4">

        <img
          [src]="item.imageUrl"
          class="w-20 h-20 object-cover rounded-md">

        <div>
          <h2 class="font-semibold text-lg">
            {{ item.name }}
          </h2>

          <p class="text-gray-500">
            {{ item.price | currency:'INR' }}
          </p>
        </div>

      </div>

      <!-- Quantity -->
      <div class="flex items-center justify-center gap-4">

        <button
          (click)="increase(item.productId)"
          class="w-8 h-8 bg-gray-200 rounded hover:bg-gray-300">

          +

        </button>

        <span class="font-semibold text-lg">
          {{ item.quantity }}
        </span>

        <button
          (click)="decrease(item.productId)"
          class="w-8 h-8 bg-gray-200 rounded hover:bg-gray-300">

          -

        </button>

      </div>

      <!-- Total Price -->
      <div class="text-center font-semibold text-lg">

        {{ item.price * item.quantity | currency:'INR' }}

      </div>

      <!-- Remove -->
      <div class="text-right">

        <button
          (click)="remove(item.productId)"
          class="text-red-500 hover:text-red-700">

          Remove

        </button>

      </div>

    </div>

    <!-- Total -->
    <div class="flex justify-between items-center border-t pt-6 mt-6">

      <h2 class="text-2xl font-bold">
        Total: {{ totalPrice() | currency:'INR' }}
      </h2>

      <a
        routerLink="/checkout"
        class="bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700 transition">

        Checkout

      </a>

    </div>

  </div>

</div>
